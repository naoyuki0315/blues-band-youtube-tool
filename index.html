<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHICAGO Setlist Builder</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%231A2B3C%22/><text x=%2250%22 y=%2265%22 font-family=%22Impact, Arial, sans-serif%22 font-size=%2238%22 text-anchor=%22middle%22 fill=%22%23D8C38E%22>DDM</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
    
    <style>
        /* アニメーションと基本設定 */
        body { -webkit-tap-highlight-color: transparent; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 印刷（A4・1枚）の極限最適化レイアウト */
        @media print {
            @page { size: A4 portrait; margin: 10mm; }
            body { background-color: white !important; margin: 0 !important; color: black !important; }
            .print-hidden { display: none !important; }
            .print-only { display: flex !important; }
            
            /* 1枚にピタッと収め、行間を最大化する魔法のフレックスボックス */
            #print-container {
                display: flex;
                flex-direction: column;
                min-height: 270mm; /* 16曲以上の時は伸びるようにmin-heightに変更 */
                width: 100%;
            }
            .print-header { flex-shrink: 0; margin-bottom: 5mm; }
            .print-table-container {
                flex-grow: 1;
                display: flex;
                flex-direction: column;
                border: 2px solid black;
            }
            
            .print-extra { color: #666; font-style: italic; background-color: #f9f9f9 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact;}
        }
        .print-only { display: none; }

        /* --- 指定比率のグリッドレイアウト --- */
        .print-grid-row {
            display: grid;
            grid-template-columns: 6.4% 58.6% 9% 10% 8% 8%;
            grid-template-rows: 1fr auto; 
            flex-grow: 1; 
            min-height: 16mm; 
            page-break-inside: avoid;
            border-bottom: 1px solid #444;
        }
        .print-grid-row:last-child { border-bottom: none; }
        
        .pg-no { grid-column: 1; grid-row: 1 / 3; display: flex; align-items: center; justify-content: center; border-right: 1px solid #444; font-size: 1.4rem; font-weight: bold; }
        .pg-title { grid-column: 2; grid-row: 1; display: flex; align-items: center; justify-content: flex-start; padding: 0 10px; border-right: 1px solid #444; text-align: left; }
        .pg-key { grid-column: 3; grid-row: 1; display: flex; align-items: center; justify-content: center; border-right: 1px solid #444; font-size: 1.4rem; font-weight: bold; }
        .pg-harp { grid-column: 4; grid-row: 1; display: flex; align-items: center; justify-content: center; border-right: 1px solid #444; font-size: 1.4rem; font-weight: bold; }
        .pg-bpm { grid-column: 5; grid-row: 1; display: flex; align-items: center; justify-content: center; border-right: 1px solid #444; font-size: 1.4rem; font-weight: bold; }
        .pg-time { grid-column: 6; grid-row: 1; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: bold; }
        
        /* 備考欄（左寄せを徹底） */
        .pg-memo {
            grid-column: 2 / 7;
            grid-row: 2;
            padding: 2px 10px 4px 10px;
            font-size: 1.0rem;
            color: #333;
            white-space: pre-wrap;
            line-height: 1.2;
            text-align: left; 
            display: flex;
            justify-content: flex-start;
        }

        /* ヘッダー用 */
        .print-grid-header {
            display: grid;
            grid-template-columns: 6.4% 58.6% 9% 10% 8% 8%;
            background-color: #e5e7eb;
            border-bottom: 2px solid black;
            height: 35px;
        }
        .print-grid-header > div {
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            border-right: 1px solid #444;
        }
        .print-grid-header > div:last-child {
            border-right: none;
        }

        .print-song-title { font-size: 1.6rem; font-weight: bold; width: 100%; line-height: 1.1; text-align: left; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 font-sans">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef } = React;

        const FALLBACK_DATA = [
            { 楽曲名: "Born in Chicago", Key: "A", "Harp (Pos)": "D (2nd)", BPM: "130", Time: "3:15", "備考・演奏指示": "カウントから激しくスタート" },
            { 楽曲名: "Got My Mojo Workin'", Key: "E", "Harp (Pos)": "A (2nd)", BPM: "150", Time: "4:20", "備考・演奏指示": "後半テンポアップ、ハープソロ炸裂" },
            { 楽曲名: "Sweet Home Chicago", Key: "E", "Harp (Pos)": "A (2nd)", BPM: "110", Time: "5:00", "備考・演奏指示": "バッキング、ギターソロ交代" },
            { 楽曲名: "Help Me", Key: "Am", "Harp (Pos)": "D (2nd)", BPM: "85", Time: "4:45", "備考・演奏指示": "妖しいストレートスローブルース" },
            { 楽曲名: "Checking Up On My Baby", Key: "A", "Harp (Pos)": "D (2nd)", BPM: "125", Time: "3:50", "備考・演奏指示": "イントロハープからリフ固定" }
        ].map((song, i) => ({ ...song, id: `song_${i}` }));

        const parseCSV = (text) => {
            const parseLine = (line) => {
                const result = [];
                let current = '';
                let inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        result.push(current);
                        current = '';
                    } else {
                        current += char;
                    }
                }
                result.push(current);
                return result.map(s => s.trim().replace(/^"|"$/g, ''));
            };

            const lines = text.split('\n').filter(line => line.trim() !== '');
            if (lines.length < 2) return [];
            const headers = parseLine(lines[0]);
            
            return lines.slice(1).map((line, idx) => {
                const values = parseLine(line);
                const obj = { id: `csv_${idx}` };
                headers.forEach((header, index) => {
                    obj[header] = values[index] !== undefined ? values[index] : '';
                });
                
                obj['楽曲名'] = obj['楽曲名'] || obj['曲名'] || values[0] || '';
                obj['Key'] = obj['Key'] || obj['キー'] || values[1] || '';
                obj['Time'] = obj['Time'] || obj['時間'] || values[2] || ''; 
                obj['Harp (Pos)'] = obj['Harp (Pos)'] || obj['Harp'] || obj['ハーモニカ'] || values[3] || '';
                obj['備考・演奏指示'] = obj['備考・演奏指示'] || obj['備考'] || obj['指示'] || values[4] || '';
                obj['BPM'] = obj['BPM'] || obj['テンポ'] || values[5] || ''; 
                
                return obj;
            });
        };

        const timeToSeconds = (timeStr) => {
            if (!timeStr) return 0;
            const parts = String(timeStr).split(':');
            if (parts.length === 2) {
                return parseInt(parts[0], 10) * 60 + parseInt(parts[1], 10);
            }
            return parseInt(timeStr, 10) || 0;
        };

        const secondsToTime = (seconds) => {
            if (isNaN(seconds) || seconds <= 0) return "0:00";
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m}:${s.toString().padStart(2, '0')}`;
        };

        const renderHarpCell = (harpText) => {
            if (!harpText) return null;
            const match = harpText.match(/^(.*?)\s*(\(.*?\))$/);
            if (match) {
                return (
                    <div className="flex flex-col items-center justify-center leading-none">
                        <span>{match[1]}</span>
                        <span style={{ fontSize: '0.7em', marginTop: '2px' }}>{match[2]}</span>
                    </div>
                );
            }
            return <span>{harpText}</span>;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('search');
            const [masterData, setMasterData] = useState([]);
            const [setlist, setSetlist] = useState([]);
            const [mainCount, setMainCount] = useState(10);
            const [extraCount, setExtraCount] = useState(3);
            const [previewScale, setPreviewScale] = useState(1);
            
            const [editingNoteIndex, setEditingNoteIndex] = useState(null);
            const [tempNoteText, setTempNoteText] = useState("");

            const [scrollPos, setScrollPos] = useState({ isTop: true, isBottom: false });
            const scrollContainerRef = useRef(null);

            const dragItem = useRef(null);
            const dragOverItem = useRef(null);
            const previewWrapperRef = useRef(null);

            const handleScroll = (e) => {
                const { scrollTop, scrollHeight, clientHeight } = e.target;
                setScrollPos({
                    isTop: scrollTop <= 5,
                    isBottom: Math.ceil(scrollTop + clientHeight) >= scrollHeight - 5
                });
            };

            useEffect(() => {
                if (activeTab === 'search' && scrollContainerRef.current) {
                    handleScroll({ target: scrollContainerRef.current });
                }
            }, [activeTab, masterData, setlist]);

            useEffect(() => {
                const updateScale = () => {
                    if (activeTab === 'preview' && previewWrapperRef.current) {
                        const wrapperWidth = previewWrapperRef.current.clientWidth;
                        const a4WidthPx = 794; 
                        if (wrapperWidth < a4WidthPx) {
                            setPreviewScale(wrapperWidth / a4WidthPx);
                        } else {
                            setPreviewScale(1);
                        }
                    }
                };
                
                setTimeout(updateScale, 10);
                window.addEventListener('resize', updateScale);
                return () => window.removeEventListener('resize', updateScale);
            }, [activeTab]);

            useEffect(() => {
                const timestamp = new Date().getTime();
                fetch(`master_data.csv?t=${timestamp}`)
                    .then(response => {
                        if (!response.ok) throw new Error('CSVが見つかりません');
                        return response.text();
                    })
                    .then(text => {
                        const data = parseCSV(text);
                        setMasterData(data.length > 0 ? data : FALLBACK_DATA);
                    })
                    .catch(() => {
                        setMasterData(FALLBACK_DATA);
                    });
            }, []);

            const toggleSong = (song) => {
                const isSelected = setlist.some(s => s.id === song.id);
                if (isSelected) {
                    setSetlist(setlist.filter(s => s.id !== song.id));
                } else {
                    setSetlist([...setlist, { ...song, uniqueId: Date.now() + Math.random() }]);
                }
            };

            const updateSetlistField = (index, field, value) => {
                const newList = [...setlist];
                newList[index][field] = value;
                setSetlist(newList);
            };

            const moveRow = (index, direction) => {
                if (direction === -1 && index === 0) return;
                if (direction === 1 && index === setlist.length - 1) return;
                
                const itemUniqueId = setlist[index].uniqueId;
                const itemEl = document.getElementById(`song-row-${itemUniqueId}`);
                let prevTop = 0;
                if (itemEl) prevTop = itemEl.getBoundingClientRect().top;

                const newList = [...setlist];
                const item = newList.splice(index, 1)[0];
                newList.splice(index + direction, 0, item);
                setSetlist(newList);

                if (itemEl) {
                    requestAnimationFrame(() => {
                        const newItemEl = document.getElementById(`song-row-${itemUniqueId}`);
                        if (newItemEl) {
                            const newTop = newItemEl.getBoundingClientRect().top;
                            const diff = newTop - prevTop;
                            window.scrollBy(0, diff);
                        }
                    });
                }
            };

            const handleSort = () => {
                if (dragItem.current === null || dragOverItem.current === null) return;
                const newList = [...setlist];
                const draggedItem = newList.splice(dragItem.current, 1)[0];
                newList.splice(dragOverItem.current, 0, draggedItem);
                dragItem.current = null;
                dragOverItem.current = null;
                setSetlist(newList);
            };

            const saveNote = () => {
                if (editingNoteIndex !== null) {
                    updateSetlistField(editingNoteIndex, '備考・演奏指示', tempNoteText);
                }
                setEditingNoteIndex(null);
            };

            const calculateTotalTime = () => {
                const mainSongs = setlist.slice(0, mainCount);
                const totalSeconds = mainSongs.reduce((acc, song) => acc + timeToSeconds(song.Time || song.時間), 0);
                return secondsToTime(totalSeconds);
            };

            const calculateAllSelectedTime = () => {
                const totalSeconds = setlist.reduce((acc, song) => acc + timeToSeconds(song.Time || song.時間), 0);
                return secondsToTime(totalSeconds);
            };

            const totalPrintCount = mainCount + extraCount;
            const isMultiPage = totalPrintCount >= 16;

            const handlePrint = () => {
                if (isMultiPage) {
                    alert("16曲以上は2枚になります。");
                }
                window.print();
            };

            const renderCountSettings = () => (
                <div className="bg-gray-50 border border-gray-200 rounded-lg p-2 md:p-4 mb-3 flex flex-col md:flex-row items-center justify-between gap-2">
                    <div className="font-bold text-gray-700 flex items-center text-sm md:text-base">
                        <i className="fas fa-music mr-2 text-red-600"></i>
                        現在 {setlist.length} 曲選択中
                        {setlist.length > 0 && (
                            <span className="ml-2 px-2 py-0.5 bg-red-50 border border-red-200 text-red-600 rounded-md text-xs md:text-sm shadow-sm">
                                計 {calculateAllSelectedTime()}
                            </span>
                        )}
                    </div>
                    <div className="flex space-x-3 md:space-x-4">
                        <div className="flex items-center">
                            <label className="text-xs md:text-sm font-bold text-gray-600 mr-1 md:mr-2">本番枠:</label>
                            <div className="flex items-center border border-gray-300 rounded overflow-hidden shadow-sm bg-white">
                                <button onClick={() => setMainCount(Math.max(1, mainCount - 1))} className="px-2 py-1 bg-gray-100 hover:bg-gray-200 active:bg-gray-300 text-gray-600 border-r"><i className="fas fa-minus text-[10px] md:text-xs"></i></button>
                                <div className="w-6 md:w-8 text-center font-bold text-sm md:text-base text-red-600">{mainCount}</div>
                                <button onClick={() => setMainCount(Math.min(30, mainCount + 1))} className="px-2 py-1 bg-gray-100 hover:bg-gray-200 active:bg-gray-300 text-gray-600 border-l"><i className="fas fa-plus text-[10px] md:text-xs"></i></button>
                            </div>
                        </div>
                        <div className="flex items-center">
                            <label className="text-xs md:text-sm font-bold text-gray-600 mr-1 md:mr-2">予備枠:</label>
                            <div className="flex items-center border border-gray-300 rounded overflow-hidden shadow-sm bg-white">
                                <button onClick={() => setExtraCount(Math.max(0, extraCount - 1))} className="px-2 py-1 bg-gray-100 hover:bg-gray-200 active:bg-gray-300 text-gray-600 border-r"><i className="fas fa-minus text-[10px] md:text-xs"></i></button>
                                <div className="w-6 md:w-8 text-center font-bold text-sm md:text-base text-gray-600">{extraCount}</div>
                                <button onClick={() => setExtraCount(Math.min(10, extraCount + 1))} className="px-2 py-1 bg-gray-100 hover:bg-gray-200 active:bg-gray-300 text-gray-600 border-l"><i className="fas fa-plus text-[10px] md:text-xs"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderSearchTab = () => (
                <div className="animate-fade-in print-hidden relative">
                    {renderCountSettings()}
                    
                    <div className="fixed right-3 md:right-5 top-[40%] transform -translate-y-1/2 flex flex-col gap-3 z-50">
                        {!scrollPos.isTop && (
                            <button 
                                onClick={() => scrollContainerRef.current?.scrollTo({ top: 0, behavior: 'smooth' })} 
                                className="bg-gray-800 bg-opacity-70 hover:bg-opacity-100 text-white p-2.5 rounded-xl shadow-2xl flex flex-col items-center transition-all border border-gray-600 backdrop-blur-sm"
                            >
                                <i className="fas fa-chevron-up text-xl mb-1"></i>
                                <span className="text-[10px] font-bold leading-tight">一番上へ</span>
                                <span className="text-[11px] font-black text-red-300 leading-tight mt-1 whitespace-nowrap">
                                    計 {calculateAllSelectedTime()}
                                </span>
                            </button>
                        )}
                        
                        {!scrollPos.isBottom && (
                            <button 
                                onClick={() => scrollContainerRef.current?.scrollTo({ top: scrollContainerRef.current.scrollHeight, behavior: 'smooth' })} 
                                className="bg-gray-800 bg-opacity-70 hover:bg-opacity-100 text-white p-2.5 rounded-xl shadow-2xl flex flex-col items-center transition-all border border-gray-600 backdrop-blur-sm"
                            >
                                <span className="text-[10px] font-bold leading-tight mb-1">一番下へ</span>
                                <i className="fas fa-chevron-down text-xl"></i>
                            </button>
                        )}
                    </div>

                    <div className="bg-white rounded-lg shadow-sm border border-gray-100 overflow-hidden">
                        <div className="bg-red-50 px-3 py-2 border-b border-red-100 flex justify-between items-center">
                            <h2 className="text-xs md:text-sm font-bold text-red-800">マスターデータから選ぶ</h2>
                            <span className="text-[10px] md:text-xs text-red-600">※タップして追加/削除</span>
                        </div>
                        
                        <div 
                            className="overflow-y-auto" 
                            style={{ maxHeight: '65vh' }}
                            ref={scrollContainerRef}
                            onScroll={handleScroll}
                        >
                            <ul className="divide-y divide-gray-100">
                                {masterData.map((song) => {
                                    const isSelected = setlist.some(s => s.id === song.id);
                                    return (
                                        <li key={song.id} 
                                            onClick={() => toggleSong(song)}
                                            className={`px-3 py-1.5 md:p-3 flex items-center justify-start cursor-pointer transition-colors ${isSelected ? 'bg-red-50' : 'hover:bg-gray-50'}`}
                                        >
                                            <div className="mr-2 md:mr-3 flex-shrink-0 w-16 md:w-20">
                                                {isSelected ? (
                                                    <button className="w-full px-1 py-1 md:px-2 bg-gray-200 text-gray-600 font-bold rounded text-xs flex justify-center items-center shadow-inner">
                                                        <i className="fas fa-check mr-1"></i> 削除
                                                    </button>
                                                ) : (
                                                    <button className="w-full px-1 py-1 md:px-2 bg-red-600 text-white font-bold rounded text-xs flex justify-center items-center shadow shadow-red-200 active:bg-red-700">
                                                        <i className="fas fa-plus mr-1"></i> 追加
                                                    </button>
                                                )}
                                            </div>
                                            <div className="flex-1 text-left">
                                                <div className={`font-bold text-sm md:text-base truncate ${isSelected ? 'text-red-700' : 'text-gray-800'}`}>
                                                    {song.楽曲名 || song.曲名}
                                                </div>
                                            </div>
                                        </li>
                                    );
                                })}
                            </ul>
                        </div>
                    </div>
                </div>
            );

            const renderEditTab = () => (
                <div className="animate-fade-in print-hidden">
                    {renderCountSettings()}

                    {setlist.length === 0 ? (
                        <div className="text-center py-16 bg-white rounded-lg border border-gray-200">
                            <i className="fas fa-list-ul text-3xl text-gray-300 mb-3"></i>
                            <p className="text-gray-500 font-medium text-sm">まだ曲が選ばれていません。<br/>「1. 曲を選ぶ」タブから追加してください。</p>
                        </div>
                    ) : (
                        <div className="space-y-1">
                            {setlist.map((song, index) => {
                                const isExtra = index >= mainCount;
                                return (
                                    <React.Fragment key={song.uniqueId}>
                                        {index === mainCount && (
                                            <div className="w-full flex justify-center py-1.5 print-hidden">
                                                <span className="bg-gray-800 text-white text-[10px] font-bold px-3 py-0.5 rounded-full shadow-md">🛑 ここから予備曲</span>
                                            </div>
                                        )}

                                        <div 
                                            id={`song-row-${song.uniqueId}`}
                                            draggable
                                            onDragStart={() => (dragItem.current = index)}
                                            onDragEnter={() => (dragOverItem.current = index)}
                                            onDragEnd={handleSort}
                                            onDragOver={(e) => e.preventDefault()}
                                            className={`bg-white border rounded shadow-sm overflow-hidden flex flex-col transition-all ${isExtra ? 'border-gray-200 bg-gray-50 opacity-80' : 'border-red-100'}`}
                                        >
                                            <div className="p-0.5 md:p-2 flex flex-col md:flex-row gap-0 md:gap-2 items-start md:items-end">
                                                <div className="flex items-center w-full md:w-auto md:flex-1 py-0.5 md:py-0">
                                                    <div className="hidden md:flex text-gray-300 p-1 cursor-grab mr-1">
                                                        <i className="fas fa-grip-vertical text-lg"></i>
                                                    </div>

                                                    <div className="md:hidden flex flex-col space-y-0 mr-1">
                                                        <button onClick={() => moveRow(index, -1)} disabled={index === 0} className={`px-1.5 py-0 rounded bg-gray-100 text-gray-600 ${index === 0 ? 'opacity-30' : 'active:bg-gray-200'}`}><i className="fas fa-arrow-up text-[8px]"></i></button>
                                                        <button onClick={() => moveRow(index, 1)} disabled={index === setlist.length - 1} className={`px-1.5 py-0 rounded bg-gray-100 text-gray-600 ${index === setlist.length - 1 ? 'opacity-30' : 'active:bg-gray-200'}`}><i className="fas fa-arrow-down text-[8px]"></i></button>
                                                    </div>

                                                    <div className="w-5 flex-shrink-0 text-center font-black text-xs md:text-base text-gray-400 mr-1">
                                                        {isExtra ? '予' : index + 1}
                                                    </div>
                                                    
                                                    <button 
                                                        onClick={(e) => {
                                                            e.stopPropagation();
                                                            setSetlist(setlist.filter((_, i) => i !== index));
                                                        }}
                                                        className="flex-shrink-0 w-6 h-6 md:w-8 md:h-8 flex items-center justify-center rounded-full bg-red-50 text-red-500 hover:bg-red-100 active:bg-red-200 transition-colors mr-1 md:mr-2"
                                                    >
                                                        <i className="fas fa-trash-alt text-[10px] md:text-xs"></i>
                                                    </button>
                                                    
                                                    <div className="flex-1 font-bold text-sm md:text-base text-gray-800 leading-none pr-1 truncate text-left">
                                                        {song.楽曲名 || song.曲名}
                                                    </div>
                                                </div>

                                                <div className="grid grid-cols-[15fr_56fr_12fr_17fr] md:flex items-end gap-0.5 w-full md:w-auto px-1 md:px-0 mb-0.5 md:mb-0">
                                                    <div className="md:w-10">
                                                        <label className="block text-[8px] md:text-[9px] font-bold text-gray-500 mb-0 md:mb-0.5 text-center leading-none">Key</label>
                                                        <input type="text" value={song.Key || ''} onChange={(e) => updateSetlistField(index, 'Key', e.target.value)} className="w-full px-0.5 py-0 md:py-1 border rounded bg-white text-[9px] md:text-xs font-bold text-center focus:ring-2 focus:ring-red-200 outline-none h-4 md:h-auto leading-none" />
                                                    </div>
                                                    <div className="md:w-16">
                                                        <label className="block text-[8px] md:text-[9px] font-bold text-gray-500 mb-0 md:mb-0.5 text-center leading-none">Harp</label>
                                                        <input type="text" value={song["Harp (Pos)"] || song.Harp || ''} onChange={(e) => updateSetlistField(index, 'Harp (Pos)', e.target.value)} className="w-full px-0.5 py-0 md:py-1 border rounded bg-white text-[9px] md:text-xs font-bold text-center focus:ring-2 focus:ring-red-200 outline-none h-4 md:h-auto leading-none" />
                                                    </div>
                                                    <div className="md:w-12">
                                                        <label className="block text-[8px] md:text-[9px] font-bold text-gray-500 mb-0 md:mb-0.5 text-center leading-none">BPM</label>
                                                        <input type="text" value={song.BPM || ''} onChange={(e) => updateSetlistField(index, 'BPM', e.target.value)} className="w-full px-0.5 py-0 md:py-1 border rounded bg-white text-[9px] md:text-xs font-bold text-center focus:ring-2 focus:ring-red-200 outline-none h-4 md:h-auto leading-none" />
                                                    </div>
                                                    <div className="md:w-14">
                                                        <label className="block text-[8px] md:text-[9px] font-bold text-gray-500 mb-0 md:mb-0.5 text-center leading-none">Time</label>
                                                        <input type="text" value={song.Time || song.時間 || ''} onChange={(e) => updateSetlistField(index, 'Time', e.target.value)} className="w-full px-0.5 py-0 md:py-1 border rounded bg-white text-[9px] md:text-xs font-bold text-center focus:ring-2 focus:ring-red-200 outline-none h-4 md:h-auto leading-none" />
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="px-2 py-1 bg-gray-50 border-t border-gray-100 flex items-center justify-between gap-2">
                                                {editingNoteIndex === index ? (
                                                    <div className="flex-1 flex gap-1 items-center">
                                                        <input type="text" value={tempNoteText} onChange={(e) => setTempNoteText(e.target.value)} className="flex-1 px-2 py-0.5 text-xs border rounded bg-white" placeholder="備考・演奏指示を入力..." />
                                                        <button onClick={saveNote} className="px-2 py-0.5 bg-green-600 text-white text-xs font-bold rounded shadow-sm"><i className="fas fa-check"></i></button>
                                                        <button onClick={() => setEditingNoteIndex(null)} className="px-2 py-0.5 bg-gray-400 text-white text-xs font-bold rounded shadow-sm"><i className="fas fa-times"></i></button>
                                                    </div>
                                                ) : (
                                                    <div className="flex-1 text-xs text-gray-600 truncate cursor-pointer hover:bg-gray-100 p-1 rounded transition-colors" onClick={() => { setTempNoteText(song['備考・演奏指示'] || ''); setEditingNoteIndex(index); }}>
                                                        <i className="fas fa-pencil-alt text-gray-400 mr-2"></i>
                                                        {song['備考・演奏指示'] || <span className="text-gray-300 italic">備考を追加...</span>}
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </React.Fragment>
                                );
                            })}
                        </div>
                    )}
                </div>
            );

            const renderPreviewTab = () => (
                <div className="animate-fade-in w-full flex justify-center bg-gray-200 py-4 md:py-8 overflow-x-auto min-h-screen print:bg-white print:p-0">
                    <div ref={previewWrapperRef} className="bg-white shadow-2xl origin-top print:shadow-none" style={{ width: '210mm', minHeight: '297mm', transform: `scale(${previewScale})`, marginBottom: '20px' }}>
                        <div id="print-container">
                            <div className="print-header text-center flex flex-col items-center justify-center border-b-4 border-black pb-2 mb-2">
                                <h1 className="text-4xl font-black tracking-widest font-serif mt-4">SET LIST</h1>
                                <div className="text-xl font-bold mt-1">Drop Down Mama</div>
                                <div className="text-lg font-bold text-gray-600 mt-1">Total Time: {calculateTotalTime()}</div>
                            </div>
                            
                            <div className="print-table-container">
                                <div className="print-grid-header">
                                    <div>No.</div>
                                    <div>Title</div>
                                    <div>Key</div>
                                    <div>Harp</div>
                                    <div>BPM</div>
                                    <div>Time</div>
                                </div>
                                
                                {setlist.slice(0, mainCount).map((song, i) => (
                                    <div key={song.uniqueId} className="print-grid-row">
                                        <div className="pg-no">{i + 1}</div>
                                        <div className="pg-title">
                                            <span className="print-song-title">{song.楽曲名 || song.曲名}</span>
                                        </div>
                                        <div className="pg-key">{song.Key}</div>
                                        <div className="pg-harp">{renderHarpCell(song["Harp (Pos)"] || song.Harp)}</div>
                                        <div className="pg-bpm">{song.BPM}</div>
                                        <div className="pg-time">{song.Time || song.時間}</div>
                                        <div className="pg-memo">{song['備考・演奏指示']}</div>
                                    </div>
                                ))}

                                {setlist.length > mainCount && extraCount > 0 && (
                                    <React.Fragment>
                                        <div className="bg-gray-300 text-center font-bold py-1 border-b border-black print-extra flex items-center justify-center" style={{ fontSize: '1.2rem', borderTop: '2px solid black' }}>
                                            --- EXTRAS / ENCORE ---
                                        </div>
                                        {setlist.slice(mainCount, mainCount + extraCount).map((song, i) => (
                                            <div key={song.uniqueId} className="print-grid-row print-extra">
                                                <div className="pg-no" style={{ fontSize: '1rem' }}>Ex{i + 1}</div>
                                                <div className="pg-title">
                                                    <span className="print-song-title" style={{ fontSize: '1.4rem' }}>{song.楽曲名 || song.曲名}</span>
                                                </div>
                                                <div className="pg-key">{song.Key}</div>
                                                <div className="pg-harp">{renderHarpCell(song["Harp (Pos)"] || song.Harp)}</div>
                                                <div className="pg-bpm">{song.BPM}</div>
                                                <div className="pg-time">{song.Time || song.時間}</div>
                                                <div className="pg-memo">{song['備考・演奏指示']}</div>
                                            </div>
                                        ))}
                                    </React.Fragment>
                                )}
                            </div>
                        </div>
                    </div>
                    
                    {/* Floating Print Button for Preview Tab */}
                    <button onClick={handlePrint} className="print-hidden fixed bottom-6 right-6 bg-[#1A2B3C] hover:bg-[#2A4B6C] border-2 border-[#D8C38E] text-[#D8C38E] rounded-full w-14 h-14 shadow-2xl flex items-center justify-center text-xl transition-transform hover:scale-110 z-50">
                        <i className="fas fa-print"></i>
                    </button>
                </div>
            );

            return (
                <div className="min-h-screen bg-gray-100 flex flex-col font-sans">
                    <header className="bg-[#1A2B3C] text-white shadow-md z-10 print-hidden sticky top-0">
                        <div className="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
                            <h1 className="text-xl md:text-2xl font-black tracking-wider flex items-center text-[#D8C38E]">
                                <i className="fas fa-music mr-2 md:mr-3"></i>
                                DDM Setlist Builder
                            </h1>
                            <div className="text-xs md:text-sm font-bold bg-gray-800 px-2 md:px-3 py-1 rounded text-[#D8C38E] border border-gray-700">
                                Total: {calculateTotalTime()}
                            </div>
                        </div>
                        
                        <div className="flex w-full max-w-4xl mx-auto">
                            <button onClick={() => setActiveTab('search')} className={`flex-1 py-3 text-sm md:text-base font-bold transition-colors border-b-4 ${activeTab === 'search' ? 'border-[#D8C38E] text-[#D8C38E] bg-gray-800' : 'border-transparent text-gray-400 hover:bg-gray-800'}`}>
                                <i className="fas fa-search mb-1 md:mb-0 md:mr-2 block md:inline"></i>1. 探す
                            </button>
                            <button onClick={() => setActiveTab('edit')} className={`flex-1 py-3 text-sm md:text-base font-bold transition-colors border-b-4 ${activeTab === 'edit' ? 'border-[#D8C38E] text-[#D8C38E] bg-gray-800' : 'border-transparent text-gray-400 hover:bg-gray-800'}`}>
                                <i className="fas fa-list mb-1 md:mb-0 md:mr-2 block md:inline"></i>2. 編集 <span className="ml-1 bg-[#D8C38E] text-gray-900 font-black text-[10px] md:text-xs px-1.5 py-0.5 rounded-full">{setlist.length}</span>
                            </button>
                            <button onClick={() => setActiveTab('preview')} className={`flex-1 py-3 text-sm md:text-base font-bold transition-colors border-b-4 ${activeTab === 'preview' ? 'border-[#D8C38E] text-[#D8C38E] bg-gray-800' : 'border-transparent text-gray-400 hover:bg-gray-800'}`}>
                                <i className="fas fa-print mb-1 md:mb-0 md:mr-2 block md:inline"></i>3. 印刷
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 w-full max-w-4xl mx-auto p-2 md:p-4 pb-24 md:pb-6 print:p-0 print:max-w-none print:m-0">
                        {activeTab === 'search' && renderSearchTab()}
                        {activeTab === 'edit' && renderEditTab()}
                        {activeTab === 'preview' && renderPreviewTab()}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
