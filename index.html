<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube概要欄作成システム</title>
  
  <!-- ファビコン: ブルースっぽくギターの絵文字を設定 -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%2250%%22 y=%2250%%22 style=%22dominant-baseline:central;text-anchor:middle;font-size:90px;%22>🎸</text></svg>">
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- PapaParse (CSV読み込み用) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useRef, useEffect } = React;

    // --- アイコンコンポーネント ---
    const CopyIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>;
    const CheckIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>;
    const TrashIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>;
    const ArrowUpIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m18 15-6-6-6 6"/></svg>;
    const ArrowDownIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6"/></svg>;
    const PlusIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>;

    // --- バンド設定 ---
    const BAND_INFO = {
      "Drop Down Mama": `Vocal/Guitar:今井さん\nVocal/Harp:スズナ\nGuitar:グミさん\nBass:戸田さん\nDrums:安永さん\nPiano:ヨッシー`,
      "2120B.B.": `Vocal/Guitar:今井さん\nVocal/Harp:スズナ\nGuitar:グミさん\nBass:芳賀さん\nDrums:安永さん\nPiano:ヨッシー`
    };
    const BAND_CHOICES = Object.keys(BAND_INFO);
    const DEFAULT_HASHTAGS = "#BluesBand #ChicagoBlues #ElectricBlues #BluesHarp #BluesHarmonica #LiveBlues #PostWarBlues #BluesMusic";

    // メインコンポーネント
    function App() {
      const [activeTab, setActiveTab] = useState('preview'); // 'preview' or 'songs'
      
      const [bandName, setBandName] = useState(BAND_CHOICES[0]);
      const [members, setMembers] = useState(BAND_INFO[BAND_CHOICES[0]]);
      const [hashtags, setHashtags] = useState(DEFAULT_HASHTAGS);
      
      const [masterSongs, setMasterSongs] = useState([]);
      const [newSongInput, setNewSongInput] = useState("");
      const [isLoadingSongs, setIsLoadingSongs] = useState(true);
      const [fetchError, setFetchError] = useState("");
      
      const [selectedSongs, setSelectedSongs] = useState([]);
      const [useEncore, setUseEncore] = useState(true);
      
      const [isCopied, setIsCopied] = useState(false);
      const textAreaRef = useRef(null);
      const listRef = useRef(null);
      const [lastMovedIndex, setLastMovedIndex] = useState(null);

      // 手動編集用テキストステート
      const [editableText, setEditableText] = useState("");

      // バンド変更時の処理
      const handleBandChange = (e) => {
        const newBand = e.target.value;
        setBandName(newBand);
        setMembers(BAND_INFO[newBand]); // メンバーを自動切り替え
      };

      // CSV読み込み
      useEffect(() => {
        setIsLoadingSongs(true);
        Papa.parse('master_data.csv', {
          download: true,
          header: true,
          skipEmptyLines: true,
          complete: (results) => {
            try {
              const songs = results.data
                .map(row => row['楽曲名'])
                .filter(song => song && song.trim() !== "");
              
              if (songs.length > 0) {
                const uniqueSongs = Array.from(new Set(songs));
                setMasterSongs(uniqueSongs);
              } else {
                setFetchError("CSVから楽曲名を取得できませんでした。「楽曲名」という列名が存在するか確認してください。");
              }
            } catch (err) {
              setFetchError("データの読み込みに失敗しました。");
            } finally {
              setIsLoadingSongs(false);
            }
          },
          error: () => {
            setFetchError("master_data.csv の読み込みに失敗しました。（※GitHub Pages等で公開後に正常に動作します）");
            setIsLoadingSongs(false);
          }
        });
      }, []);

      // 手動でマスターに曲を追加
      const handleAddSongToMaster = (e) => {
        e.preventDefault();
        const trimmed = newSongInput.trim();
        if (trimmed && !masterSongs.includes(trimmed)) {
          setMasterSongs([trimmed, ...masterSongs]);
          setNewSongInput("");
        }
      };

      // 曲の選択状態を切り替え（追加・削除）
      const toggleSongSelection = (song) => {
        if (selectedSongs.includes(song)) {
          setSelectedSongs(selectedSongs.filter(s => s !== song));
        } else {
          setSelectedSongs([...selectedSongs, song]);
        }
      };

      // 選択済みの曲を削除
      const removeSelectedSong = (index) => {
        const newSelected = [...selectedSongs];
        newSelected.splice(index, 1);
        setSelectedSongs(newSelected);
      };

      // 選択済みの曲の順番を移動
      const moveSong = (index, direction) => {
        const newSelected = [...selectedSongs];
        let newIndex = index;
        if (direction === 'up' && index > 0) {
          [newSelected[index - 1], newSelected[index]] = [newSelected[index], newSelected[index - 1]];
          newIndex = index - 1;
        } else if (direction === 'down' && index < newSelected.length - 1) {
          [newSelected[index + 1], newSelected[index]] = [newSelected[index], newSelected[index + 1]];
          newIndex = index + 1;
        }
        setSelectedSongs(newSelected);
        setLastMovedIndex(newIndex);
      };

      // 曲移動時のスクロール追従処理
      useEffect(() => {
        if (lastMovedIndex !== null && listRef.current) {
          const items = listRef.current.children;
          if (items && items[lastMovedIndex]) {
            // 移動した要素が枠内に収まるようにスクロール（連打に対応）
            items[lastMovedIndex].scrollIntoView({ block: 'nearest' });
          }
          setLastMovedIndex(null);
        }
      }, [selectedSongs, lastMovedIndex]);

      // YouTube用テキスト生成
      const generatedText = useMemo(() => {
        const lines = [];
        lines.push("");
        lines.push(`🎵 【 ${bandName.toUpperCase()} 】 🎵`);
        lines.push("LIVE PERFORMANCE");
        lines.push("");
        lines.push("■ Members");
        lines.push(members);
        lines.push("");
        lines.push("■ Timestamps (Chapters)");
        lines.push("00:00 Intro / Greeting (準備・挨拶)");
        
        selectedSongs.forEach((song, index) => {
          let displayName = song;
          if (useEncore && index === selectedSongs.length - 1) {
            displayName = `${song}（アンコール曲）`;
          }
          lines.push(`00:00 ${displayName}`);
        });
        
        lines.push("");
        lines.push("■ Hashtags");
        lines.push(hashtags);
        
        return lines.join("\n");
      }, [bandName, members, hashtags, selectedSongs, useEncore]);

      // 生成テキストが変更されたら編集用テキストを上書き
      useEffect(() => {
        setEditableText(generatedText);
      }, [generatedText]);

      // コピー処理
      const handleCopy = () => {
        if (textAreaRef.current) {
          textAreaRef.current.select();
          try {
            document.execCommand('copy');
            setIsCopied(true);
            setTimeout(() => setIsCopied(false), 2000);
          } catch (err) {
            console.error('Failed to copy', err);
          }
        }
      };

      return (
        <div className="min-h-screen bg-slate-50 text-slate-800 p-4 md:p-8 font-sans pb-20">
          <div className="max-w-6xl mx-auto">
            
            <header className="mb-6 border-b border-slate-200 pb-4">
              <h1 className="text-3xl font-bold flex items-center gap-3 text-slate-900">
                <span className="text-4xl">📺</span> YouTube概要欄作成システム
              </h1>
            </header>

            {/* タブナビゲーション */}
            <div className="flex border-b border-slate-200 mb-6 bg-white rounded-t-lg overflow-hidden shadow-sm">
              <button
                onClick={() => setActiveTab('preview')}
                className={`flex-1 py-4 font-medium text-sm transition-colors border-b-2 ${activeTab === 'preview' ? 'border-blue-600 text-blue-600 bg-blue-50/50' : 'border-transparent text-slate-500 hover:text-slate-700 hover:bg-slate-50'}`}
              >
                📝 作成・プレビュー
              </button>
              <button
                onClick={() => setActiveTab('songs')}
                className={`flex-1 py-4 font-medium text-sm transition-colors border-b-2 ${activeTab === 'songs' ? 'border-blue-600 text-blue-600 bg-blue-50/50' : 'border-transparent text-slate-500 hover:text-slate-700 hover:bg-slate-50'}`}
              >
                <div className="flex items-center justify-center gap-2">
                  🎵 曲リスト
                  {selectedSongs.length > 0 && (
                    <span className="bg-blue-600 text-white text-xs px-2 py-0.5 rounded-full">{selectedSongs.length}</span>
                  )}
                </div>
              </button>
            </div>

            {/* --- タブ: 作成・プレビュー --- */}
            {activeTab === 'preview' && (
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                
                {/* 左側: バンド設定 & セットリスト */}
                <div className="space-y-6">
                  {/* バンド設定 */}
                  <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                    <h2 className="text-xl font-semibold mb-4 flex items-center gap-2 border-b pb-2">📋 Band Info</h2>
                    <div className="space-y-4">
                      <div>
                        <label className="block text-sm font-medium text-slate-700 mb-1">バンド名</label>
                        <select 
                          value={bandName}
                          onChange={handleBandChange}
                          className="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white"
                        >
                          {BAND_CHOICES.map(band => <option key={band} value={band}>{band}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="block text-sm font-medium text-slate-700 mb-1">メンバー</label>
                        <textarea 
                          value={members}
                          onChange={(e) => setMembers(e.target.value)}
                          rows={6}
                          className="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 resize-y"
                        />
                      </div>
                      <div>
                        <label className="block text-sm font-medium text-slate-700 mb-1">ハッシュタグ</label>
                        <input 
                          type="text" 
                          value={hashtags}
                          onChange={(e) => setHashtags(e.target.value)}
                          className="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
                        />
                      </div>
                    </div>
                  </div>

                  {/* 選択済みセットリスト */}
                  <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                    <div className="flex justify-between items-center mb-4 border-b pb-2">
                      <h2 className="text-xl font-semibold flex items-center gap-2">🎸 セットリスト ({selectedSongs.length}曲)</h2>
                      <button onClick={() => setActiveTab('songs')} className="text-sm text-blue-600 hover:underline">曲を追加する</button>
                    </div>

                    <div 
                      ref={listRef}
                      className="space-y-2 mb-4 min-h-[150px] max-h-[300px] overflow-y-auto bg-slate-50 p-2 sm:p-4 rounded-lg border border-slate-200"
                    >
                      {selectedSongs.length === 0 ? (
                        <div className="text-center text-slate-400 py-8 flex flex-col items-center">
                          <span className="text-4xl mb-2">📄</span>
                          <p>曲が選択されていません。<br/>「曲リスト」タブから追加してください。</p>
                        </div>
                      ) : (
                        selectedSongs.map((song, index) => (
                          <div key={index} className="flex items-center justify-between bg-white p-2 sm:p-3 rounded shadow-sm border border-slate-200 group gap-1 sm:gap-2">
                            <div className="flex items-center gap-2 sm:gap-3 overflow-hidden flex-1 min-w-0">
                              <span className="bg-blue-100 text-blue-800 font-mono text-[10px] sm:text-xs px-1.5 sm:px-2 py-0.5 sm:py-1 rounded-full min-w-[1.5rem] sm:min-w-[2rem] text-center flex-shrink-0">{index + 1}</span>
                              <span className="text-sm sm:text-base font-medium truncate flex-1">{song}</span>
                            </div>
                            <div className="flex items-center gap-0 sm:gap-1 opacity-100 transition-opacity flex-shrink-0">
                              <button onClick={() => moveSong(index, 'up')} disabled={index === 0} className="p-1.5 sm:p-1 hover:bg-slate-100 rounded text-slate-600 disabled:opacity-30"><ArrowUpIcon /></button>
                              <button onClick={() => moveSong(index, 'down')} disabled={index === selectedSongs.length - 1} className="p-1.5 sm:p-1 hover:bg-slate-100 rounded text-slate-600 disabled:opacity-30"><ArrowDownIcon /></button>
                              <button onClick={() => removeSelectedSong(index)} className="p-1.5 sm:p-1 hover:bg-red-50 hover:text-red-600 rounded text-slate-400 transition-colors ml-0.5 sm:ml-2"><TrashIcon /></button>
                            </div>
                          </div>
                        ))
                      )}
                    </div>

                    <div className="flex items-center gap-2">
                      <input 
                        type="checkbox" id="encore-check" checked={useEncore} onChange={(e) => setUseEncore(e.target.checked)}
                        className="w-4 h-4 text-blue-600 rounded border-slate-300 focus:ring-blue-500"
                      />
                      <label htmlFor="encore-check" className="text-sm font-medium text-slate-700 cursor-pointer select-none">最後の曲はアンコール？ ( 曲名の後ろに（アンコール曲）を付与 )</label>
                    </div>
                  </div>
                </div>

                {/* 右側: 出力 */}
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col h-full min-h-[600px]">
                  <div className="bg-slate-800 text-white px-6 py-4 flex justify-between items-center">
                    <h2 className="text-lg font-semibold flex items-center gap-2">📝 YouTubeコピペ用出力</h2>
                    <button 
                      onClick={handleCopy}
                      className={`flex items-center gap-2 px-4 py-2 rounded-md transition-all font-medium text-sm ${isCopied ? "bg-green-500 hover:bg-green-600" : "bg-blue-600 hover:bg-blue-700"}`}
                    >
                      {isCopied ? <CheckIcon /> : <CopyIcon />} {isCopied ? "コピー完了" : "コピーする"}
                    </button>
                  </div>
                  <div className="p-6 flex-1 flex flex-col">
                    <textarea 
                      ref={textAreaRef}
                      value={editableText}
                      onChange={(e) => setEditableText(e.target.value)}
                      className="w-full flex-1 p-4 bg-slate-50 border border-slate-200 rounded-lg font-mono text-sm resize-none focus:outline-none focus:ring-2 focus:ring-blue-500"
                    />
                    <p className="text-xs text-slate-400 mt-2 text-right">※自由に編集できます（左側の設定を変更するとリセットされます）</p>
                  </div>
                </div>

              </div>
            )}

            {/* --- タブ: 曲リスト --- */}
            {activeTab === 'songs' && (
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                <div className="flex justify-between items-end mb-6 border-b pb-4">
                  <div>
                    <h2 className="text-xl font-semibold flex items-center gap-2">🎵 楽曲マスターリスト</h2>
                    <p className="text-sm text-slate-500 mt-1">追加ボタンを押すとセットリストに入ります。</p>
                  </div>
                  {isLoadingSongs && (
                    <span className="text-xs font-normal text-blue-600 bg-blue-50 px-3 py-1.5 rounded-full flex items-center gap-2">
                      <span className="animate-spin inline-block w-3 h-3 border-2 border-blue-600 border-t-transparent rounded-full"></span> CSV読込中...
                    </span>
                  )}
                </div>

                {fetchError && (
                  <div className="mb-6 p-4 bg-red-50 text-red-700 text-sm rounded-md border border-red-200">{fetchError}</div>
                )}

                {/* 手動追加フォーム */}
                <form onSubmit={handleAddSongToMaster} className="flex gap-2 mb-8 bg-slate-50 p-4 rounded-lg border border-slate-200">
                  <input 
                    type="text" placeholder="CSVにない新しい曲名を追加..." value={newSongInput} onChange={(e) => setNewSongInput(e.target.value)}
                    className="flex-1 px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
                  />
                  <button type="submit" disabled={!newSongInput.trim()} className="bg-slate-800 text-white px-4 py-2 rounded-md hover:bg-slate-700 disabled:opacity-50 flex items-center gap-2 transition text-sm font-medium">
                    <PlusIcon /> マスターに追加
                  </button>
                </form>

                {/* リスト表示 */}
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                  {masterSongs.map((song, idx) => {
                    const isSelected = selectedSongs.includes(song);
                    return (
                      <div key={idx} onClick={() => toggleSongSelection(song)} className={`flex items-center justify-between p-3 rounded-lg border cursor-pointer transition-colors ${isSelected ? 'border-blue-400 bg-blue-50' : 'border-slate-200 bg-white hover:border-slate-300'}`}>
                        <span className={`font-medium text-sm truncate pr-2 ${isSelected ? 'text-blue-900' : 'text-slate-700'}`}>{song}</span>
                        <button 
                          className={`flex-shrink-0 px-3 py-1.5 rounded text-xs font-bold transition-all ${isSelected ? 'bg-red-100 text-red-600 hover:bg-red-200' : 'bg-slate-100 text-slate-600 hover:bg-blue-100 hover:text-blue-600'}`}
                        >
                          {isSelected ? '削除' : '追加'}
                        </button>
                      </div>
                    );
                  })}
                </div>
                
                {masterSongs.length === 0 && !isLoadingSongs && !fetchError && (
                   <p className="text-center py-8 text-slate-500">曲データがありません。</p>
                )}
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
